
upstream frontend {
    server frontend:5173;
    # keepalive disabled
}

upstream api {
    server api:4000;
    # keepalive disabled
}

limit_req_zone $binary_remote_addr zone=ratelimit_auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=ratelimit_scanner:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=ratelimit_general:10m rate=30r/m;

server {
    listen 80;
    server_name chainscoutsecurity.com;
    if ($host != "localhost") { return 301 https://$server_name$request_uri; }
}

server {
    listen 443 ssl;
    server_name chainscoutsecurity.com;

    ssl_certificate /etc/letsencrypt/live/chainscoutsecurity.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chainscoutsecurity.com/privkey.pem;

    server_tokens off;
    client_max_body_size 26m;

    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    keepalive_timeout 65;
    keepalive_requests 100;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Connection "close";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/ {
        limit_req zone=ratelimit_auth burst=5 nodelay;
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Connection "close";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/scans {
        limit_req zone=ratelimit_scanner burst=50 nodelay;
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Connection "close";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        limit_req zone=ratelimit_general burst=50 nodelay;
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Connection "close";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /health {
        proxy_pass http://api;
        access_log off;
    }
}
