upstream frontend {
    server frontend:5173;
}

upstream api {
    server api:4000;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=ratelimit_auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=ratelimit_scanner:1d rate=3r/d;
limit_req_zone $binary_remote_addr zone=ratelimit_general:10m rate=30r/m;

# HTTP Server (Production - awaiting SSL certificates from certbot)
server {
    listen 80;
    server_name app.chainscout.com *.chainscout.com localhost;

    # Disable server tokens
    server_tokens off;
    client_max_body_size 26m;
    client_body_timeout 60s;

    # Basic security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;

    # Frontend
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # API with rate limiting
    location /api/ {
        limit_req zone=ratelimit_general burst=50 nodelay;
        
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Auth endpoints - stricter rate limiting
    location /api/auth/ {
        limit_req zone=ratelimit_auth burst=5 nodelay;
        
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Scan endpoints - per-day limit
    location /api/scans {
        limit_req zone=ratelimit_scanner burst=1 nodelay;
        
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://api;
        access_log off;
    }
}

