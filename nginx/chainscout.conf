    # Root location - serve React static files
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # API routes with rate limiting
    location /api/ {
        limit_req zone=ratelimit_general burst=50 nodelay;

        # Rate limit auth endpoints specifically
        location /api/auth/ {
            limit_req zone=ratelimit_auth burst=5 nodelay;
            proxy_pass http://api;
            include /etc/nginx/proxy_params.conf;
        }

        # Rate limit scan endpoint (Freemium 3/day)
        location /api/scans {
            limit_req zone=ratelimit_scanner burst=1 nodelay;
            proxy_pass http://api;
            include /etc/nginx/proxy_params.conf;
        }

        # Other API routes
        proxy_pass http://api;
        include /etc/nginx/proxy_params.conf;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://api;
        access_log off;
    }

    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# API-specific server
server {
    listen 443 ssl http2;
    server_name api.chainscout.com;

    ssl_certificate /etc/nginx/certs/chainscout.crt;
    ssl_certificate_key /etc/nginx/certs/chainscout.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

    client_max_body_size 26m;
    server_tokens off;

    location / {
        limit_req zone=ratelimit_general burst=100 nodelay;
        proxy_pass http://api;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/auth/ {
        limit_req zone=ratelimit_auth burst=5 nodelay;
        proxy_pass http://api;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/scans {
        limit_req zone=ratelimit_scanner burst=1 nodelay;
        proxy_pass http://api;
        include /etc/nginx/proxy_params.conf;
    }
}
